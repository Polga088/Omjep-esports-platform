    <path stroke="#22d3ee" stroke-width="0.5" d="M44 78h12"/>
    <path stroke="#67e8f9" stroke-width="0.45" opacity="0.9" d="M20 64 Q50 58 80 64"/>
    <path stroke="#06b6d4" stroke-width="0.4" d="M24 36 L30 32 M76 36 L70 32"/>
  </g>
  <!-- Points lumineux -->
  <circle cx="28" cy="50" r="1.2" fill="#ecfeff" opacity="0.95"/>
  <circle cx="72" cy="50" r="1.2" fill="#ecfeff" opacity="0.95"/>
  <circle cx="50" cy="58" r="1" fill="#a5f3fc" opacity="0.85"/>
