  <path fill="url(#cn-fiber)" opacity="0.5" d="M12 38c12-8 26-12 38-12s26 4 38 12l8 4v52H4V42l8-4z"/>
  <ellipse cx="50" cy="28" rx="22" ry="10" fill="#0c1220"/>

  <!-- Lignes n�on  circuit / racing -->
  <g fill="none" stroke-width="0.85" stroke-linecap="round" stroke-linejoin="round" filter="url(#cn-glow)">
    <path stroke="url(#cn-neon-a)" d="M18 44h64M22 52h56M26 60h48M30 68h40"/>
